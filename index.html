<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Howard's Science Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f0f4f8;min-height:100vh}
#topbar{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
#topbar .logo{font-size:20px}
#topbar .title{font-weight:800;color:#1e293b;font-size:15px}
#homebtn{margin-left:auto;background:none;border:1px solid #e2e8f0;border-radius:8px;padding:5px 14px;font-size:12px;color:#64748b;cursor:pointer;font-weight:600;display:none;font-family:inherit}
.screen{display:none;max-width:560px;margin:0 auto;padding:24px 16px}
.screen.active{display:block}
#resultScreen{max-width:580px}
.card{background:#fff;border-radius:20px;padding:28px 28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1.5px solid #e2e8f0;margin-bottom:16px}
.prog-wrap{margin-bottom:18px}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px}
.prog-track{background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:99px;transition:width .4s ease}
.score-live{display:flex;gap:10px}
.score-c{color:#16a34a;font-weight:700}
.score-w{color:#dc2626;font-weight:700}
.badge{border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid transparent;display:inline-block}
.badge-Ecosystems{background:#e0f2fe;color:#0c4a6e;border-color:#0284c733}
.badge-Adaptations{background:#fef3c7;color:#78350f;border-color:#d9770633}
.badge-Plants{background:#dcfce7;color:#14532d;border-color:#16a34a33}
.badge-Oral{background:#f3e8ff;color:#6b21a8;border-color:#9333ea33}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.q-type{font-size:11px;color:#94a3b8;margin-left:auto;font-weight:600}
.q-text{font-size:17px;font-weight:700;color:#1e293b;line-height:1.55;margin-bottom:22px}
#spellWrap input{width:100%;padding:12px 16px;font-size:15px;border-radius:12px;border:2px solid #94a3b855;outline:none;font-family:inherit;color:#1e293b;margin-bottom:12px;transition:border .2s,background .2s}
#spellWrap input:focus{border-color:#3b82f6}
#spellWrap input.correct{border-color:#86efac;background:#f0fdf4}
#spellWrap input.wrong{border-color:#fca5a5;background:#fff5f5}
.choice-btn{width:100%;padding:12px 16px;font-size:14px;font-weight:600;border-radius:12px;border:2px solid #e2e8f0;background:#fff;text-align:left;cursor:pointer;font-family:inherit;color:#1e293b;margin-bottom:10px;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.choice-btn:hover:not(:disabled){background:rgba(59,130,246,.08);border-color:#3b82f6}
.choice-btn.correct{background:#f0fdf4!important;border-color:#86efac!important;color:#15803d!important}
.choice-btn.wrong{background:#fff5f5!important;border-color:#fca5a5!important;color:#b91c1c!important}
.choice-btn.dim{opacity:.4}
#tfWrap{display:flex;gap:14px}
.tf-btn{flex:1;padding:14px;font-size:15px;font-weight:800;border-radius:14px;cursor:pointer;font-family:inherit;border:2px solid transparent;transition:transform .15s,opacity .2s}
.tf-btn:hover:not(:disabled){transform:scale(1.04)}
.tf-true{background:#dcfce7;color:#166534;border-color:#16a34a44}
.tf-false{background:#fee2e2;color:#991b1b;border-color:#dc262644}
.tf-btn.correct{background:#f0fdf4!important;border-color:#16a34a!important}
.tf-btn.wrong{background:#fff5f5!important;border-color:#dc2626!important}
.tf-btn.dim{opacity:.35}
#feedbackPanel{margin-top:18px;border-radius:16px;padding:18px 20px;border:2px solid transparent;display:none;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#feedbackPanel.correct{background:#f0fdf4;border-color:#86efac}
#feedbackPanel.wrong{background:#fff5f5;border-color:#fca5a5}
.fb-row{display:flex;align-items:center;gap:10px}
.fb-icon{width:36px;height:36px;border-radius:50%;color:#fff;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fb-icon.correct{background:#16a34a}
.fb-icon.wrong{background:#dc2626}
.fb-label{font-size:17px;font-weight:800}
.fb-label.correct{color:#15803d}
.fb-label.wrong{color:#b91c1c}
.fb-detail{margin-top:10px;margin-left:46px}
.fb-your{font-size:13px;color:#64748b;margin-bottom:4px}
.fb-your b{color:#dc2626}
.fb-ans{font-size:14px;color:#15803d;font-weight:700}
.fb-ans span{background:#dcfce7;border:1.5px solid #86efac;border-radius:8px;padding:2px 10px;display:inline-block;margin-top:2px}
.fb-next-row{margin-top:14px;display:flex;justify-content:flex-end}

/* ORAL hint box */
.oral-hint{background:#fdf4ff;border:1.5px solid #d8b4fe;border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;color:#6b21a8;display:none;line-height:1.6}
.oral-hint b{font-weight:800}

#skipBtn{display:block;margin:12px auto 0;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit}
.btn{color:#fff;border:none;border-radius:12px;padding:11px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-blue{background:#3b82f6}
.btn-navy{background:#1d4ed8}
.btn-green{background:#16a34a}
.btn-red{background:#dc2626}
.btn-purple{background:#9333ea}
.btn-gray{background:#f1f5f9;color:#475569!important}
.btn-wide{width:100%;justify-content:center;font-size:17px;padding:16px;border-radius:16px;box-shadow:0 4px 16px rgba(29,78,216,.2)}
.hero{background:linear-gradient(135deg,#1e3a5f 0%,#1e40af 60%,#3b82f6 100%);border-radius:24px;padding:32px 28px;color:#fff;margin-bottom:24px;box-shadow:0 8px 32px rgba(30,64,175,.2)}
.hero-emoji{font-size:38px;margin-bottom:8px}
.hero h1{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.hero p{font-size:14px;opacity:.8}
.hero p.sub{font-size:13px;opacity:.65;margin-top:4px}
.settings-card{background:#fff;border-radius:20px;padding:24px 22px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1.5px solid #e2e8f0;margin-bottom:20px}
.settings-title{font-size:14px;font-weight:800;color:#475569;letter-spacing:.6px;text-transform:uppercase;margin-bottom:18px}
.lbl{font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px;margin-top:16px;letter-spacing:.4px;text-transform:uppercase}
.seg{display:flex;flex-wrap:wrap;gap:6px}
.seg-btn{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .15s;font-family:inherit}
.seg-btn.active{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
input[type=range]{width:100%;accent-color:#3b82f6;margin-top:4px}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:2px}
.result-card{background:#fff;border-radius:24px;padding:32px 28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1.5px solid #e2e8f0;text-align:center;margin-bottom:24px}
.result-pct{font-size:64px;font-weight:900;line-height:1}
.result-label{font-size:20px;font-weight:700;color:#1e293b;margin:8px 0 4px}
.result-sub{color:#64748b;font-size:15px}
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.review-title{font-size:15px;font-weight:800;color:#dc2626;letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase}
.review-item{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;border:1.5px solid #fecaca;box-shadow:0 2px 8px rgba(220,38,38,.06)}
.review-q{font-size:14px;color:#1e293b;margin-bottom:10px;font-weight:600}
.review-your{font-size:13px;color:#dc2626;margin-bottom:4px}
.review-correct{font-size:13px;color:#16a34a}
.legend{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.perfect{text-align:center;color:#16a34a;font-size:16px;font-weight:700;padding:20px}
@media(max-width:400px){.screen{padding:16px 10px}.card{padding:20px 16px}#tfWrap{flex-direction:column}}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">🔬</span>
  <span class="title">Howard's Science Quiz</span>
  <button id="homebtn" onclick="goHome()">← Home</button>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="hero">
    <div class="hero-emoji">🔬</div>
    <h1>Howard's Science Quiz</h1>
    <p>Chapter 3 & 4 · Ecosystems, Adaptations & Plants</p>
    <p class="sub" id="totalCount"></p>
  </div>
  <div class="settings-card">
    <div class="settings-title">Quiz Settings</div>
    <div class="lbl">Topic</div>
    <div class="seg" id="topicSeg"></div>
    <div class="lbl">Question Type</div>
    <div class="seg" id="typeSeg"></div>
    <div class="lbl">Order</div>
    <div class="seg" id="modeSeg"></div>
    <div class="lbl" id="countLbl"></div>
    <input type="range" id="countRange" min="1" value="10" oninput="updateCount()">
    <div class="range-labels"><span>1</span><span id="rangeMax"></span></div>
  </div>
  <button class="btn btn-navy btn-wide" onclick="startQuiz()">Start Quiz 🚀</button>
  <div class="legend">
    <span class="badge badge-Ecosystems">Ecosystems</span>
    <span class="badge badge-Adaptations">Adaptations</span>
    <span class="badge badge-Plants">Plants</span>
    <span class="badge badge-Oral">Oral</span>
  </div>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
  <div class="prog-wrap">
    <div class="prog-labels">
      <span id="progText">Q 1 / 10</span>
      <div class="score-live">
        <span class="score-c" id="scoreC">✓ 0</span>
        <span class="score-w" id="scoreW">✗ 0</span>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="q-meta">
      <span id="qBadge" class="badge"></span>
      <span id="qType" class="q-type"></span>
    </div>
    <p id="qText" class="q-text"></p>
    <div id="spellWrap" style="display:none">
      <input type="text" id="spellInput" placeholder="Type your answer…" autocomplete="off">
      <button class="btn btn-blue" id="checkSpellBtn" onclick="checkSpell()">Check Answer ✓</button>
    </div>
    <div id="mcWrap" style="display:none"></div>
    <div id="tfWrap" style="display:none">
      <button class="tf-btn tf-true" id="tfTrue" onclick="submitAnswer('true')">✓  True</button>
      <button class="tf-btn tf-false" id="tfFalse" onclick="submitAnswer('false')">✗  False</button>
    </div>
    <!-- oral: show answer button -->
    <div id="oralWrap" style="display:none">
      <button class="btn btn-purple" onclick="revealOral()">💬 Show Answer / Model Answer</button>
      <div class="oral-hint" id="oralHint"></div>
    </div>
    <div id="feedbackPanel">
      <div class="fb-row">
        <div class="fb-icon" id="fbIcon"></div>
        <span class="fb-label" id="fbLabel"></span>
      </div>
      <div class="fb-detail" id="fbDetail"></div>
      <div class="fb-next-row">
        <button class="btn btn-green" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
      </div>
    </div>
  </div>
  <button id="skipBtn" onclick="submitAnswer('__skipped__')">Skip this question</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-pct" id="resPct"></div>
    <div class="result-label" id="resLabel"></div>
    <div class="result-sub" id="resSub"></div>
    <div class="result-btns">
      <button class="btn btn-blue" onclick="retryAll()">Retry All</button>
      <button class="btn btn-red" id="retryWrongBtn" onclick="retryWrong()" style="display:none"></button>
      <button class="btn btn-gray" onclick="goHome()">Home</button>
    </div>
  </div>
  <div id="reviewSection"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION BANK  (verified + expanded)
// ═══════════════════════════════════════════════════════
const ALL_Q = [

// ────────────────────────────────────────────────────
// CHAPTER 3 : RELATIONSHIPS IN ECOSYSTEMS
// ────────────────────────────────────────────────────

// —— Fill-in (Spelling) ——
{id:1, topic:"Ecosystems", type:"spell",
 q:"Organisms in an ecosystem are in _____ with each other for limited amounts of water, food, energy, and space.",
 a:"competition"},
{id:2, topic:"Ecosystems", type:"spell",
 q:"Organisms need food and energy to _____ in an ecosystem.",
 a:"live"},
{id:3, topic:"Ecosystems", type:"spell",
 q:"Members of an ecosystem can be sorted into three main groups: _____, consumers, and decomposers.",
 a:"producers"},
{id:4, topic:"Ecosystems", type:"spell",
 q:"Organisms that break down and recycle dead matter are called _____.",
 a:"decomposers"},
{id:5, topic:"Ecosystems", type:"spell",
 q:"The order in which organisms eat one another is called a(n) _____ _____.",
 a:"food chain"},
{id:6, topic:"Ecosystems", type:"spell",
 q:"Different food chains connected together form a(n) _____ _____.",
 a:"food web"},
{id:7, topic:"Ecosystems", type:"spell",
 q:"Energy moves through an ecosystem from plants to herbivores and then to _____.",
 a:"carnivores"},
{id:8, topic:"Ecosystems", type:"spell",
 q:"A diagram that shows how energy is used in an ecosystem is called a(n) _____ _____.",
 a:"energy pyramid"},
{id:55,topic:"Ecosystems", type:"spell",
 q:"Organisms that eat only plants are called _____.",
 a:"herbivores"},
{id:56,topic:"Ecosystems", type:"spell",
 q:"Organisms that eat both plants and animals are called _____.",
 a:"omnivores"},
{id:57,topic:"Ecosystems", type:"spell",
 q:"Organisms that hunt other animals for food are called _____.",
 a:"predators"},
{id:58,topic:"Ecosystems", type:"spell",
 q:"Animals that are hunted by other animals are called _____.",
 a:"prey"},

// —— Multiple Choice ——
{id:9, topic:"Ecosystems", type:"mc",
 q:"I am a living thing that can use energy from the Sun to make food. What am I?",
 choices:["consumer","producer","decomposer","carnivore"], a:"producer"},
{id:10,topic:"Ecosystems", type:"mc",
 q:"I am a living thing that must use other organisms as food to get energy. What am I?",
 choices:["producer","decomposer","consumer","herbivore"], a:"consumer"},
{id:11,topic:"Ecosystems", type:"mc",
 q:"I am an organism that breaks down and recycles the remains of dead organisms. What am I?",
 choices:["consumer","producer","carnivore","decomposer"], a:"decomposer"},
{id:12,topic:"Ecosystems", type:"mc",
 q:"I show the order in which organisms in an ecosystem consume one another. What am I?",
 choices:["food web","energy pyramid","food chain","competition"], a:"food chain"},
{id:13,topic:"Ecosystems", type:"mc",
 q:"I am the struggle among organisms for food, water, and other things needed to live. What am I?",
 choices:["mimicry","adaptation","competition","camouflage"], a:"competition"},
{id:14,topic:"Ecosystems", type:"mc",
 q:"I am formed when food chains are linked together. What am I?",
 choices:["food chain","energy pyramid","food web","competition"], a:"food web"},
{id:15,topic:"Ecosystems", type:"mc",
 q:"I show the flow of energy through an ecosystem. What am I?",
 choices:["food web","food chain","energy pyramid","decomposer"], a:"energy pyramid"},
{id:59,topic:"Ecosystems", type:"mc",
 q:"Which group of organisms is at the BOTTOM of an energy pyramid?",
 choices:["carnivores","herbivores","decomposers","producers"], a:"producers"},
{id:60,topic:"Ecosystems", type:"mc",
 q:"Which organisms eat only other animals?",
 choices:["herbivores","omnivores","producers","carnivores"], a:"carnivores"},
{id:61,topic:"Ecosystems", type:"mc",
 q:"What do decomposers do for an ecosystem?",
 choices:["Make food from sunlight","Hunt other animals","Break down dead matter and recycle nutrients","Compete for water"], a:"Break down dead matter and recycle nutrients"},
{id:62,topic:"Ecosystems", type:"mc",
 q:"Energy enters most ecosystems through which process?",
 choices:["Decomposition","Photosynthesis","Competition","Predation"], a:"Photosynthesis"},
{id:63,topic:"Ecosystems", type:"mc",
 q:"A hawk eats a snake, which ate a frog, which ate a grasshopper, which ate grass. What is the grass in this food chain?",
 choices:["Consumer","Carnivore","Decomposer","Producer"], a:"Producer"},
{id:64,topic:"Ecosystems", type:"mc",
 q:"Food webs show the relationships between _____ and _____.",
 choices:["producers and decomposers","predators and prey","herbivores and carnivores","plants and water"], a:"predators and prey"},

// —— True / False ——
{id:16,topic:"Ecosystems", type:"tf",
 q:"Energy enters an ecosystem through producers — organisms that make their own food.",
 a:"true"},
{id:17,topic:"Ecosystems", type:"tf",
 q:"Herbivores eat only other animals.",
 a:"false"},
{id:18,topic:"Ecosystems", type:"tf",
 q:"Omnivores eat both plants and animals.",
 a:"true"},
{id:19,topic:"Ecosystems", type:"tf",
 q:"Food chains begin with sunlight and end with decomposers.",
 a:"true"},
{id:20,topic:"Ecosystems", type:"tf",
 q:"Predators are organisms that are hunted.",
 a:"false"},
{id:21,topic:"Ecosystems", type:"tf",
 q:"A food web in a land community can be connected to a food web in a water community.",
 a:"true"},
{id:65,topic:"Ecosystems", type:"tf",
 q:"An energy pyramid shows that there is MORE energy available at the top (carnivore) level than at the bottom (producer) level.",
 a:"false"},
{id:66,topic:"Ecosystems", type:"tf",
 q:"Decomposers are consumers because they must eat other organisms to get energy.",
 a:"true"},
{id:67,topic:"Ecosystems", type:"tf",
 q:"Competition happens when two organisms need the same limited resource.",
 a:"true"},
{id:68,topic:"Ecosystems", type:"tf",
 q:"A mushroom growing on a dead log is an example of a decomposer at work.",
 a:"true"},

// ────────────────────────────────────────────────────
// CHAPTER 4 LESSON 1 : ANIMAL ADAPTATIONS
// ────────────────────────────────────────────────────

// —— Spelling ——
{id:22,topic:"Adaptations",type:"spell",
 q:"Animals have adaptations that they use to protect themselves from _____.",
 a:"predators"},
{id:23,topic:"Adaptations",type:"spell",
 q:"Some organisms copy the traits of other living things. This adaptation is called _____.",
 a:"mimicry"},
{id:24,topic:"Adaptations",type:"spell",
 q:"Organisms have _____ that help them survive in their environments.",
 a:"traits"},
{id:25,topic:"Adaptations",type:"spell",
 q:"Any trait that helps an organism survive in its environment is called a(n) _____.",
 a:"adaptation"},
{id:26,topic:"Adaptations",type:"spell",
 q:"Animals that serve as food for other animals are called _____.",
 a:"prey"},
{id:27,topic:"Adaptations",type:"spell",
 q:"The fur of an arctic fox changes color so it can blend into its environment. This adaptation is called _____.",
 a:"camouflage"},
{id:28,topic:"Adaptations",type:"spell",
 q:"Some animals survive the cold winter by remaining completely still for a long period, or _____.",
 a:"hibernate"},
{id:69,topic:"Adaptations",type:"spell",
 q:"Organisms have physical traits AND _____ adaptations that help them survive.",
 a:"behavioral"},
{id:70,topic:"Adaptations",type:"spell",
 q:"The three types of consumers based on what they eat are herbivores, carnivores, and _____.",
 a:"omnivores"},

// —— Multiple Choice ——
{id:29,topic:"Adaptations",type:"mc",
 q:"Each ecosystem has special _____ for organisms that live there.",
 choices:["adaptations","challenges","food webs","traits"], a:"challenges"},
{id:30,topic:"Adaptations",type:"mc",
 q:"Physical (body) traits and behavior are two kinds of adaptations that help animals to _____.",
 choices:["compete","hibernate","survive","migrate"], a:"survive"},
{id:31,topic:"Adaptations",type:"mc",
 q:"The fennec fox has large ears that give off _____ and thin fur that helps it stay cool.",
 choices:["water","light","heat","energy"], a:"heat"},
{id:32,topic:"Adaptations",type:"mc",
 q:"Camels have humps to store fat for _____ and hooves to walk on sand.",
 choices:["water","energy","heat","hibernation"], a:"energy"},
{id:33,topic:"Adaptations",type:"mc",
 q:"Kangaroo rats survive in the desert because they get water from the _____ they eat.",
 choices:["plants","animals","food","soil"], a:"food"},
{id:34,topic:"Adaptations",type:"mc",
 q:"An organism with camouflage can hide from predators because it blends in with the _____ and shapes of its environment.",
 choices:["sounds","sizes","colors","smells"], a:"colors"},
{id:35,topic:"Adaptations",type:"mc",
 q:"Hover flies and scarlet king snakes can survive because they look like more dangerous organisms — this adaptation is called _____.",
 choices:["camouflage","competition","mimicry","hibernation"], a:"mimicry"},
{id:71,topic:"Adaptations",type:"mc",
 q:"Which of the following is a BEHAVIORAL adaptation?",
 choices:["Sharp claws","Thick fur","Hibernating in winter","A hard shell"], a:"Hibernating in winter"},
{id:72,topic:"Adaptations",type:"mc",
 q:"Which of the following is a PHYSICAL adaptation?",
 choices:["Migrating south","Hibernating","Building a nest","Webbed feet for swimming"], a:"Webbed feet for swimming"},
{id:73,topic:"Adaptations",type:"mc",
 q:"An arctic fox's fur turns white in winter. What is the main purpose of this adaptation?",
 choices:["To keep warm","To camouflage in snow","To attract a mate","To scare predators"], a:"To camouflage in snow"},
{id:74,topic:"Adaptations",type:"mc",
 q:"The hedgehog's spines are an example of which type of adaptation?",
 choices:["Mimicry","Camouflage","Physical protection","Hibernation"], a:"Physical protection"},
{id:75,topic:"Adaptations",type:"mc",
 q:"Which animal adaptation helps organisms survive cold winters WITHOUT moving to a warmer place?",
 choices:["Camouflage","Mimicry","Hibernation","Competition"], a:"Hibernation"},

// —— True / False ——
{id:36,topic:"Adaptations",type:"tf",
 q:"Desert organisms have adaptations for staying alive and saving water.",
 a:"true"},
{id:37,topic:"Adaptations",type:"tf",
 q:"Mimicry means an organism blends in with its background colors.",
 a:"false"},
{id:38,topic:"Adaptations",type:"tf",

const TYPE_LABELS={spell:"Spelling",mc:"Multiple Choice",tf:"True / False",oral:"Oral Exam"};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let selTopic="All Topics", selType="All Types", selMode="random", selCount=10;
let quiz=[], qIdx=0, answers={}, scoreC=0, scoreW=0, answered=false;

function norm(s){return(s||"").toLowerCase().trim().replace(/\s+/g," ");}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getPool(){
  return ALL_Q.filter(q=>
    (selTopic==="All Topics"||q.topic===selTopic)&&
    (selType==="All Types"||q.type===selType));
}

// ── SCREENS ──────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("homebtn").style.display=id==="homeScreen"?"none":"block";
}
function goHome(){showScreen("homeScreen");buildHome();}

// ── HOME ─────────────────────────────────────────────
function buildHome(){
  document.getElementById("totalCount").textContent=ALL_Q.length+" total questions";
  buildSeg("topicSeg",["All Topics","Ecosystems","Adaptations","Plants","Oral"],selTopic,v=>{selTopic=v;buildHome();});
  buildSeg("typeSeg",["All Types","spell","mc","tf","oral"],selType,v=>{selType=v;buildHome();},
    {"All Types":"All",spell:"Spelling",mc:"Multiple Choice",tf:"True/False",oral:"Oral"});
  buildSeg("modeSeg",["random","ordered"],selMode,v=>{selMode=v;buildHome();},
    {random:"🔀 Random",ordered:"📋 In Order"});
  refreshPool();
}
function buildSeg(cid,opts,active,cb,labels={}){
  const el=document.getElementById(cid);el.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="seg-btn"+(o===active?" active":"");
    b.textContent=labels[o]||o;
    b.onclick=()=>cb(o);
    el.appendChild(b);
  });
}
function refreshPool(){
  const pool=getPool(),max=pool.length||1;
  const r=document.getElementById("countRange");
  r.max=max;if(selCount>max)selCount=max;r.value=selCount;
  document.getElementById("rangeMax").textContent=max;
  document.getElementById("countLbl").textContent=
    "Questions: "+Math.min(selCount,pool.length)+" / "+pool.length+" available";
}
function updateCount(){selCount=+document.getElementById("countRange").value;refreshPool();}

// ── START ─────────────────────────────────────────────
function startQuiz(customQ){
  let pool=customQ||getPool();
  if(selMode==="random"&&!customQ)pool=shuffle(pool);
  quiz=pool.slice(0,Math.min(selCount,pool.length));
  qIdx=0;answers={};scoreC=0;scoreW=0;answered=false;
  showScreen("quizScreen");renderQuestion();
}
function retryAll(){startQuiz(shuffle(quiz));}
function retryWrong(){
  const w=quiz.filter(q=>norm(answers[q.id]||"")!==norm(q.a)&&answers[q.id]!=="__oral__");
  if(w.length)startQuiz(shuffle(w));
}

// ── RENDER QUESTION ───────────────────────────────────
function renderQuestion(){
  answered=false;
  const q=quiz[qIdx],total=quiz.length;
  document.getElementById("progText").textContent="Q "+(qIdx+1)+" / "+total;
  document.getElementById("scoreC").textContent="✓ "+scoreC;
  document.getElementById("scoreW").textContent="✗ "+scoreW;
  document.getElementById("progFill").style.width=(qIdx/total*100)+"%";

  const badge=document.getElementById("qBadge");
  badge.textContent=q.topic;badge.className="badge badge-"+q.topic;
  document.getElementById("qType").textContent=TYPE_LABELS[q.type];
  document.getElementById("qText").textContent=q.q;

  ["spellWrap","mcWrap","tfWrap","oralWrap"].forEach(id=>
    document.getElementById(id).style.display="none");
  const fb=document.getElementById("feedbackPanel");
  fb.style.display="none";fb.className="";
  document.getElementById("oralHint").style.display="none";
  document.getElementById("skipBtn").style.display="block";

  if(q.type==="spell"){
    document.getElementById("spellWrap").style.display="block";
    const inp=document.getElementById("spellInput");
    inp.value="";inp.className="";inp.disabled=false;
    document.getElementById("checkSpellBtn").style.display="inline-flex";
    setTimeout(()=>inp.focus(),50);
    inp.onkeydown=e=>{if(e.key==="Enter"&&inp.value.trim())checkSpell();};
  }
  if(q.type==="mc"){
    const wrap=document.getElementById("mcWrap");
    wrap.style.display="block";wrap.innerHTML="";
    q.choices.forEach(ch=>{
      const b=document.createElement("button");
      b.className="choice-btn";b.textContent=ch;
      b.onclick=()=>submitAnswer(ch);
      wrap.appendChild(b);
    });
  }
  if(q.type==="tf"){
    document.getElementById("tfWrap").style.display="flex";
    document.getElementById("tfTrue").className="tf-btn tf-true";
    document.getElementById("tfFalse").className="tf-btn tf-false";
    document.getElementById("tfTrue").disabled=false;
    document.getElementById("tfFalse").disabled=false;
  }
  if(q.type==="oral"){
    document.getElementById("oralWrap").style.display="block";
    document.getElementById("skipBtn").style.display="none";
  }
}

// ── ORAL REVEAL ───────────────────────────────────────
function revealOral(){
  const q=quiz[qIdx];
  const hint=document.getElementById("oralHint");
  hint.innerHTML="<b>Model Answer:</b><br>"+q.a.replace(/\n/g,"<br>");
  hint.style.display="block";
  // mark oral as "seen" — counted as correct for scoring purposes
  answers[q.id]="__oral__";
  scoreC++;
  document.getElementById("scoreC").textContent="✓ "+scoreC;
  document.getElementById("progFill").style.width=((qIdx+1)/quiz.length*100)+"%";
  const isLast=qIdx===quiz.length-1;
  // show next button inside oral wrap
  const fb=document.getElementById("feedbackPanel");
  fb.style.display="block";fb.className="correct";
  document.getElementById("fbIcon").textContent="💬";
  document.getElementById("fbIcon").className="fb-icon correct";
  document.getElementById("fbLabel").textContent="Review the model answer above";
  document.getElementById("fbLabel").className="fb-label correct";
  document.getElementById("fbDetail").innerHTML="";
  document.getElementById("nextBtn").textContent=isLast?"See Results 🏁":"Next Question →";
  answered=true;
}

// ── SPELL ─────────────────────────────────────────────
function checkSpell(){
  if(answered)return;
  const val=document.getElementById("spellInput").value.trim();
  if(!val)return;
  submitAnswer(val);
}

// ── SUBMIT ────────────────────────────────────────────
function submitAnswer(val){
  if(answered)return;
  answered=true;
  const q=quiz[qIdx];
  const correct=norm(val)===norm(q.a);
  answers[q.id]=val;
  if(val==="__skipped__"){scoreW++;}
  else if(correct){scoreC++;}
  else{scoreW++;}
  document.getElementById("skipBtn").style.display="none";

  if(q.type==="spell"){
    const inp=document.getElementById("spellInput");
    inp.disabled=true;
    inp.className=correct?"correct":"wrong";
    document.getElementById("checkSpellBtn").style.display="none";
  }
  if(q.type==="mc"){
    document.querySelectorAll("#mcWrap .choice-btn").forEach(btn=>{
      btn.disabled=true;
      const isThis=btn.textContent===val;
      const isRight=norm(btn.textContent)===norm(q.a);
      if(isRight){btn.classList.add("correct");btn.innerHTML+=` <span>✓</span>`;}
      else if(isThis){btn.classList.add("wrong");btn.innerHTML+=` <span>✗</span>`;}
      else{btn.classList.add("dim");}
    });
  }
  if(q.type==="tf"){
    document.getElementById("tfTrue").disabled=true;
    document.getElementById("tfFalse").disabled=true;
    ["true","false"].forEach(opt=>{
      const btn=document.getElementById("tf"+opt.charAt(0).toUpperCase()+opt.slice(1));
      const isRight=opt===norm(q.a);
      const isPicked=opt===val;
      if(isRight)btn.classList.add("correct");
      else if(isPicked)btn.classList.add("wrong");
      else btn.classList.add("dim");
    });
  }

  const fb=document.getElementById("feedbackPanel");
  fb.style.display="block";
  fb.className=correct?"correct":"wrong";
  const icon=document.getElementById("fbIcon");
  icon.textContent=correct?"✓":"✗";
  icon.className="fb-icon "+(correct?"correct":"wrong");
  const lbl=document.getElementById("fbLabel");
  lbl.textContent=correct?"Correct!":"Not quite…";
  lbl.className="fb-label "+(correct?"correct":"wrong");
  const detail=document.getElementById("fbDetail");
  if(correct){
    detail.innerHTML="";
  } else {
    const shown=val==="__skipped__"?"(skipped)":val;
    detail.innerHTML=
      `<div class="fb-your">Your answer: <b>${shown}</b></div>`+
      `<div class="fb-ans">✓ Correct answer: <span>${q.a}</span></div>`;
  }
  const isLast=qIdx===quiz.length-1;
  document.getElementById("nextBtn").textContent=isLast?"See Results 🏁":"Next Question →";
  document.getElementById("progFill").style.width=((qIdx+1)/quiz.length*100)+"%";
  document.getElementById("scoreC").textContent="✓ "+scoreC;
  document.getElementById("scoreW").textContent="✗ "+scoreW;
}

// ── NEXT ──────────────────────────────────────────────
function nextQuestion(){
  if(qIdx===quiz.length-1)showResults();
  else{qIdx++;renderQuestion();}
}

// ── RESULTS ───────────────────────────────────────────
function showResults(){
  showScreen("resultScreen");
  const total=quiz.length;
  const pct=Math.round(scoreC/total*100);
  const grade=pct>=90?{label:"Excellent! 🌟",color:"#16a34a"}
    :pct>=75?{label:"Good Job! 👍",color:"#0284c7"}
    :pct>=60?{label:"Keep Practicing 📚",color:"#d97706"}
    :{label:"Need More Review 💪",color:"#dc2626"};
  const pctEl=document.getElementById("resPct");
  pctEl.textContent=pct+"%";pctEl.style.color=grade.color;
  document.getElementById("resLabel").textContent=grade.label;
  document.getElementById("resSub").textContent=scoreC+" / "+total+" correct";
  const wrong=quiz.filter(q=>
    answers[q.id]!=="__oral__"&&norm(answers[q.id]||"")!==norm(q.a));
  const rwBtn=document.getElementById("retryWrongBtn");
  if(wrong.length>0){rwBtn.style.display="inline-flex";rwBtn.textContent="Retry Wrong ("+wrong.length+")";}
  else{rwBtn.style.display="none";}
  const sec=document.getElementById("reviewSection");
  if(wrong.length===0){sec.innerHTML=`<div class="perfect">🎉 All answers correct!</div>`;return;}
  let html=`<div class="review-title">✗ Review These (${wrong.length})</div>`;
  wrong.forEach(q=>{
    const u=answers[q.id]||"__skipped__";
    html+=`<div class="review-item">
      <div class="q-meta">
        <span class="badge badge-${q.topic}">${q.topic}</span>
        <span class="q-type">${TYPE_LABELS[q.type]}</span>
      </div>
      <div class="review-q">${q.q}</div>
      <div class="review-your">✗ Your answer: <b>${u==="__skipped__"?"(skipped)":u}</b></div>
      <div class="review-correct">✓ Correct answer: <b>${q.a}</b></div>
    </div>`;
  });
  sec.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────
buildHome();
</script>
